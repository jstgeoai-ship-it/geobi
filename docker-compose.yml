services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: GEOBI-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - GEOBI-network
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: GEOBI-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - GEOBI-network
        depends_on:
            - app

    db:
        image: postgis/postgis:16-3.4
        container_name: GEOBI-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: GEOBI
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: pass
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./backup/GEOBI.dump:/docker-entrypoint-initdb.d/GEOBI.dump
        networks:
            - GEOBI-network

    martin:
        image: ghcr.io/maplibre/martin:latest
        container_name: GEOBI-martin
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - DATABASE_URL=postgresql://postgres:postgres@db:5432/GEOBI
        networks:
            - GEOBI-network
        depends_on:
            - db

volumes:
    pgdata:

networks:
    GEOBI-network:
        driver: bridge
