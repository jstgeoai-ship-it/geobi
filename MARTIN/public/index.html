<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartTax — PBB-P2 Viewer</title>

    <!-- MapLibre GL JS -->
    <link
      href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        z-index: 10;
      }

      .logo {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      header h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: #f1f5f9;
      }

      header span {
        font-size: 12px;
        color: #64748b;
        margin-left: 4px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        margin-left: auto;
        box-shadow: 0 0 6px #22c55e88;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Main Layout ── */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Map ── */
      #map {
        flex: 1;
        height: 100%;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 300px;
        background: #1a1d27;
        border-left: 1px solid #2d3148;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-section {
        padding: 16px;
        border-bottom: 1px solid #2d3148;
      }

      .sidebar-section h3 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 12px;
      }

      /* ── Layer Toggle ── */
      .layer-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .layer-item:hover {
        background: #252836;
      }

      .layer-swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .layer-label {
        font-size: 13px;
        color: #cbd5e1;
        flex: 1;
      }

      .toggle {
        width: 32px;
        height: 18px;
        background: #3b82f6;
        border-radius: 9px;
        position: relative;
        cursor: pointer;
        border: none;
        flex-shrink: 0;
      }

      .toggle::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .toggle.off {
        background: #374151;
      }
      .toggle.off::after {
        transform: translateX(0);
      }
      .toggle.on::after {
        transform: translateX(14px);
      }

      /* ── Legend ── */
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 12px;
        color: #94a3b8;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── Feature Popup ── */
      .feature-panel {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .feature-panel h3 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 12px;
      }

      .feature-empty {
        font-size: 12px;
        color: #475569;
        font-style: italic;
      }

      .attr-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 8px 0;
        border-bottom: 1px solid #1e2235;
      }

      .attr-key {
        font-size: 10px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .attr-val {
        font-size: 13px;
        color: #e2e8f0;
        font-weight: 500;
      }

      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge-sudah {
        background: #14532d;
        color: #4ade80;
      }
      .badge-belum {
        background: #7f1d1d;
        color: #f87171;
      }
      .badge-nol {
        background: #1e3a5f;
        color: #60a5fa;
      }

      /* ── MapLibre Popup Override ── */
      .maplibregl-popup-content {
        background: #1a1d27 !important;
        color: #e2e8f0 !important;
        border: 1px solid #2d3148 !important;
        border-radius: 8px !important;
        padding: 12px !important;
        font-family: "Inter", system-ui, sans-serif !important;
        font-size: 12px !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
      }

      .maplibregl-popup-tip {
        border-top-color: #2d3148 !important;
      }
      .maplibregl-popup-close-button {
        color: #64748b !important;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🗺</div>
      <h1>PBB-P2 Viewer <span>via Martin + MapLibre</span></h1>
      <div class="status-dot" id="statusDot" title="Connecting..."></div>
    </header>

    <div class="main">
      <div id="map"></div>

      <aside class="sidebar">
        <!-- Layer Control -->
        <div class="sidebar-section">
          <h3>Layer</h3>
          <div class="layer-item">
            <div
              class="layer-swatch"
              style="background: #3b82f6; border: 1px solid #60a5fa"
            ></div>
            <span class="layer-label">Persil Bangunan</span>
            <button
              class="toggle on"
              id="toggleLayer"
              onclick="toggleLayer(this)"
            ></button>
          </div>
        </div>

        <!-- Legend -->
        <div class="sidebar-section">
          <h3>Status Pembayaran</h3>
          <div class="legend-item">
            <div class="legend-swatch" style="background: #22c55e"></div>
            Sudah Bayar
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background: #ef4444"></div>
            Belum Bayar
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background: #3b82f6"></div>
            PBB Bayar 0 Rupiah
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background: #94a3b8"></div>
            Lainnya
          </div>
        </div>

        <!-- Feature Info -->
        <div class="feature-panel">
          <h3>Info Fitur</h3>
          <div class="feature-empty" id="featureEmpty">
            Klik pada persil untuk melihat atribut
          </div>
          <div id="featureAttrs"></div>
        </div>
      </aside>
    </div>

    <script>
      // ============================================================
      //  KONFIGURASI — sesuaikan dengan setup kamu
      // ============================================================
      const MARTIN_URL = "http://localhost:3000"; // URL Martin
      const TABLE_NAME = "data_tanah"; // ⚠️  ganti dengan nama tabel PostgreSQL kamu
      const CENTER_LNG = 106.7797; // Longitude pusat Jakarta
      const CENTER_LAT = -6.2746;
      const ZOOM_INIT = 13;
      // ============================================================

      // Inisialisasi Map
      const map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
          sources: {
            // Basemap OpenStreetMap via raster tiles
            osm: {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              attribution: "© OpenStreetMap contributors",
            },
          },
          layers: [
            {
              id: "osm-layer",
              type: "raster",
              source: "osm",
              minzoom: 0,
              maxzoom: 19,
            },
          ],
        },
        center: [CENTER_LNG, CENTER_LAT],
        zoom: ZOOM_INIT,
      });

      // Kontrol navigasi (zoom +/-)
      map.addControl(new maplibregl.NavigationControl(), "top-left");
      map.addControl(new maplibregl.ScaleControl(), "bottom-left");

      // ── Tambah Layer MVT dari Martin setelah map siap ──
      map.on("load", () => {
        checkMartinStatus();

        // 1. Daftarkan source MVT dari Martin
        map.addSource("persil", {
          type: "vector",
          tiles: [`${MARTIN_URL}/${TABLE_NAME}/{z}/{x}/{y}`],
          minzoom: 0,
          maxzoom: 22,
        });

        // 2. Layer FILL — warna berdasarkan status pembayaran
        map.addLayer({
          id: "persil-fill",
          type: "fill",
          source: "persil",
          "source-layer": TABLE_NAME, // harus sama dengan nama tabel
          paint: {
            "fill-color": [
              "match",
              ["get", "status_pem"],
              "SUDAH BAYAR",
              "#22c55e",
              "PBB BAYAR 0 RUPI…",
              "#3b82f6", // sesuaikan nilai string dari DB
              /* default */ [
                "case",
                ["in", "BELUM BAYAR", ["get", "status_pem"]],
                "#ef4444",
                "#94a3b8",
              ],
            ],
            "fill-opacity": 0.6,
          },
        });

        // 3. Layer OUTLINE
        map.addLayer({
          id: "persil-outline",
          type: "line",
          source: "persil",
          "source-layer": TABLE_NAME,
          paint: {
            "line-color": "#ffffff",
            "line-width": 0.5,
            "line-opacity": 0.4,
          },
        });

        // 4. Layer HIGHLIGHT (saat di-hover)
        map.addLayer({
          id: "persil-highlight",
          type: "fill",
          source: "persil",
          "source-layer": TABLE_NAME,
          paint: {
            "fill-color": "#f59e0b",
            "fill-opacity": 0.8,
          },
          filter: ["==", "gid", ""], // kosong dulu, diisi saat hover
        });
      });

      // ── Hover Highlight ──
      map.on("mousemove", "persil-fill", (e) => {
        if (!e.features.length) return;
        map.getCanvas().style.cursor = "pointer";
        const gid = e.features[0].properties.gid;
        map.setFilter("persil-highlight", ["==", "gid", gid]);
      });

      map.on("mouseleave", "persil-fill", () => {
        map.getCanvas().style.cursor = "";
        map.setFilter("persil-highlight", ["==", "gid", ""]);
      });

      // ── Klik → Tampilkan Info di Sidebar ──
      map.on("click", "persil-fill", (e) => {
        if (!e.features.length) return;
        const props = e.features[0].properties;
        showFeatureInfo(props);
      });

      // ── Fungsi Tampilkan Atribut ──
      function showFeatureInfo(props) {
        document.getElementById("featureEmpty").style.display = "none";
        const container = document.getElementById("featureAttrs");

        const statusBadge = (val) => {
          if (!val) return `<span class="attr-val">-</span>`;
          let cls = "badge-nol";
          if (val.includes("SUDAH")) cls = "badge-sudah";
          if (val.includes("BELUM")) cls = "badge-belum";
          return `<span class="status-badge ${cls}">${val}</span>`;
        };

        const fmt = (n) =>
          n != null
            ? parseFloat(n).toLocaleString("id-ID", {
                maximumFractionDigits: 2,
              })
            : "-";

        container.innerHTML = `
      <div class="attr-row">
        <span class="attr-key">ID Objek Pajak</span>
        <span class="attr-val">${props.idobjekpaj || "-"}</span>
      </div>
      <div class="attr-row">
        <span class="attr-key">Status Pembayaran</span>
        ${statusBadge(props.status_pem)}
      </div>
      <div class="attr-row">
        <span class="attr-key">Luas Tanah</span>
        <span class="attr-val">${fmt(props.luas_tanah)} m²</span>
      </div>
      <div class="attr-row">
        <span class="attr-key">Luas Bangunan</span>
        <span class="attr-val">${fmt(props.luas_bangu)} m²</span>
      </div>
      <div class="attr-row">
        <span class="attr-key">Rasio Bangunan/Tanah</span>
        <span class="attr-val">${props.ratio ? parseFloat(props.ratio).toFixed(4) : "-"}</span>
      </div>
      <div class="attr-row">
        <span class="attr-key">RT / RW</span>
        <span class="attr-val">${props.rt || "-"} / ${props.rw || "-"}</span>
      </div>
    `;
      }

      // ── Toggle Layer ──
      function toggleLayer(btn) {
        const isOn = btn.classList.contains("on");
        btn.classList.toggle("on", !isOn);
        btn.classList.toggle("off", isOn);
        const vis = isOn ? "none" : "visible";
        ["persil-fill", "persil-outline", "persil-highlight"].forEach((id) => {
          if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", vis);
        });
      }

      // ── Cek Status Martin ──
      async function checkMartinStatus() {
        const dot = document.getElementById("statusDot");
        try {
          const res = await fetch(`${MARTIN_URL}/catalog`);
          if (res.ok) {
            dot.style.background = "#22c55e";
            dot.style.boxShadow = "0 0 6px #22c55e88";
            dot.title = "Martin terhubung ✓";
          } else throw new Error();
        } catch {
          dot.style.background = "#ef4444";
          dot.style.boxShadow = "0 0 6px #ef444488";
          dot.style.animation = "none";
          dot.title =
            "Martin tidak terhubung — pastikan sudah berjalan di port 3000";
        }
      }
    </script>
  </body>
</html>
